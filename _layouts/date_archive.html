---
layout: post
---
<section>
  {% for post in page.posts %}
    <article>
      <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
      {% assign parts = post.content | split: "<h2 " %}
      {% if parts.size > 1 %}
        {{ parts[0] }}
      {% else %}
        {{ post.content | truncatewords: 60 }}
      {% endif %}
    </article>
  {% endfor %}
</section>
